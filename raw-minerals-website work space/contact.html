<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact — Raw Mineral Resources</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">Raw Mineral Resources</div>
        <nav class="nav">
          <a href="index.html">Home</a>
          <a href="minerals.html">Our Minerals</a>
          <a href="process.html">Our Process</a>
          <a href="ethics.html#ethics-hero">Our Ethics</a>
          <a href="about.html">About</a>
          <a href="contact.html" class="cta active">Contact</a>
        </nav>
      </div>
    </header>

    <main class="section container">
      <h1>Contact</h1>
      <p class="muted">Let’s talk. Reach out to our sales and operations team to request sample analysis, price quotes, or logistics information.</p>

      <div style="margin-top:28px; max-width:680px;">
        <form>
          <label class="muted">Name</label>
          <input style="width:100%;padding:10px;border-radius:8px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--white)" placeholder="Your name" />
          <label class="muted">Email</label>
          <input style="width:100%;padding:10px;border-radius:8px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--white)" placeholder="you@example.com" />
          <label class="muted">Message</label>
          <textarea style="width:100%;padding:10px;border-radius:8px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--white);height:120px" placeholder="Tell us about your project or request"></textarea>
          <div class="centered"><button class="btn primary" type="button">Send Message</button></div>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>© Raw Mineral Resources Company Ltd.</div>
        <nav class="footer-nav"><a href="index.html">Home</a></nav>
      </div>
    </footer>

    <script src="scripts/main.js" defer></script>
